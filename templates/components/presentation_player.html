<!-- Presentation Player Component -->
<div
  id="presentationPlayer"
  class="hidden fixed inset-0 bg-black z-50 flex flex-col"
>
  <!-- Top Bar -->
  <div class="flex items-center justify-between px-6 py-4 bg-gray-900">
    <div class="flex items-center space-x-4">
      <h2 class="text-white text-xl font-semibold" id="presentationTitle">
        Educational Presentation
      </h2>
      <span class="text-gray-400 text-sm" id="slideIndicator"
        >Slide 1 of 5</span
      >
    </div>
    <button
      onclick="closePresentationPlayer()"
      class="text-gray-400 hover:text-white transition-colors text-2xl"
      title="Close Player"
    >
      ✕
    </button>
  </div>

  <!-- Video Container -->
  <div
    class="flex-1 flex items-center justify-center bg-black relative overflow-hidden"
  >
    <video
      id="presentationVideo"
      class="max-w-full max-h-full"
      preload="metadata"
    >
      <source src="" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <!-- Slide Overlay (shows current slide info) -->
    <div
      id="slideOverlay"
      class="absolute top-4 left-4 bg-black bg-opacity-70 text-white px-4 py-2 rounded-lg opacity-0 transition-opacity duration-300"
    >
      <div class="font-semibold" id="currentSlideTitle">Title Slide</div>
      <div class="text-sm text-gray-300" id="currentSlideType">title</div>
    </div>

    <!-- Loading Indicator -->
    <div
      id="videoLoading"
      class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden"
    >
      <div class="flex flex-col items-center space-y-4">
        <div class="spinner border-white border-t-blue-500"></div>
        <span class="text-white">Loading video...</span>
      </div>
    </div>
  </div>

  <!-- Slide Navigation Bar -->
  <div class="bg-gray-900 px-6 py-4">
    <!-- Progress Bar -->
    <div class="mb-4">
      <div class="flex items-center space-x-4">
        <span class="text-gray-400 text-sm w-16" id="currentTime">0:00</span>
        <div class="flex-1 relative">
          <div
            class="h-2 bg-gray-700 rounded-full overflow-hidden cursor-pointer"
            id="progressBar"
            onclick="seekVideo(event)"
          >
            <div
              class="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-100"
              id="progressFill"
              style="width: 0%"
            ></div>
          </div>
          <!-- Slide Markers -->
          <div
            id="slideMarkers"
            class="absolute top-0 left-0 right-0 h-2 pointer-events-none"
          >
            <!-- Markers will be populated here -->
          </div>
        </div>
        <span class="text-gray-400 text-sm w-16 text-right" id="totalTime"
          >0:00</span
        >
      </div>
    </div>

    <!-- Controls -->
    <div class="flex items-center justify-between">
      <!-- Left Controls -->
      <div class="flex items-center space-x-4">
        <button
          onclick="previousSlide()"
          class="text-white hover:text-blue-400 transition-colors p-2 rounded-lg hover:bg-gray-800"
          title="Previous Slide (←)"
        >
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
          </svg>
        </button>

        <button
          onclick="togglePlayPause()"
          class="text-white hover:text-blue-400 transition-colors p-3 rounded-full hover:bg-gray-800 bg-gray-800"
          id="playPauseBtn"
          title="Play/Pause (Space)"
        >
          <svg
            id="playIcon"
            class="w-8 h-8"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg
            id="pauseIcon"
            class="w-8 h-8 hidden"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>

        <button
          onclick="nextSlide()"
          class="text-white hover:text-blue-400 transition-colors p-2 rounded-lg hover:bg-gray-800"
          title="Next Slide (→)"
        >
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>
      </div>

      <!-- Center - Slide Thumbnails -->
      <div class="flex-1 mx-8 overflow-hidden">
        <div
          id="slideThumbnails"
          class="flex items-center justify-center space-x-2 overflow-x-auto py-2 scrollbar-hide"
        >
          <!-- Slide thumbnails will be populated here -->
        </div>
      </div>

      <!-- Right Controls -->
      <div class="flex items-center space-x-4">
        <!-- Playback Speed -->
        <div class="flex items-center space-x-2">
          <span class="text-gray-400 text-sm">Speed:</span>
          <select
            id="playbackSpeed"
            onchange="changePlaybackSpeed(this.value)"
            class="bg-gray-800 text-white border border-gray-700 rounded px-2 py-1 text-sm"
          >
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </div>

        <!-- Volume -->
        <div class="flex items-center space-x-2">
          <button
            onclick="toggleMute()"
            class="text-white hover:text-blue-400 transition-colors"
            id="volumeBtn"
          >
            <svg
              id="volumeIcon"
              class="w-6 h-6"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
              />
            </svg>
            <svg
              id="muteIcon"
              class="w-6 h-6 hidden"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"
              />
            </svg>
          </button>
          <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.1"
            value="1"
            onchange="changeVolume(this.value)"
            class="w-20 accent-blue-500"
          />
        </div>

        <!-- Fullscreen -->
        <button
          onclick="toggleFullscreen()"
          class="text-white hover:text-blue-400 transition-colors p-2 rounded-lg hover:bg-gray-800"
          title="Fullscreen (F)"
        >
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Slide List Panel (collapsible) -->
  <div
    id="slideListPanel"
    class="absolute right-0 top-16 bottom-24 w-80 bg-gray-900 border-l border-gray-700 transform translate-x-full transition-transform duration-300 overflow-hidden"
  >
    <div class="p-4 border-b border-gray-700">
      <h3 class="text-white font-semibold">Slides</h3>
    </div>
    <div id="slideList" class="overflow-y-auto h-full pb-20">
      <!-- Slide list items will be populated here -->
    </div>
  </div>

  <!-- Toggle Slide Panel Button -->
  <button
    onclick="toggleSlidePanel()"
    id="togglePanelBtn"
    class="absolute right-0 top-1/2 transform -translate-y-1/2 bg-gray-800 text-white p-2 rounded-l-lg hover:bg-gray-700 transition-colors"
    title="Toggle Slide List"
  >
    <svg
      class="w-5 h-5"
      id="panelOpenIcon"
      fill="currentColor"
      viewBox="0 0 24 24"
    >
      <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
    </svg>
    <svg
      class="w-5 h-5 hidden"
      id="panelCloseIcon"
      fill="currentColor"
      viewBox="0 0 24 24"
    >
      <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
    </svg>
  </button>
</div>

<style>
  /* Custom scrollbar for slide thumbnails */
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* Slide thumbnail styles */
  .slide-thumbnail {
    min-width: 60px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0.375rem;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 2px solid transparent;
  }

  .slide-thumbnail:hover {
    transform: scale(1.05);
  }

  .slide-thumbnail.active {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
  }

  /* Slide type colors */
  .slide-type-title {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  .slide-type-objectives {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white;
  }
  .slide-type-concept {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
  }
  .slide-type-definition {
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    color: white;
  }
  .slide-type-example {
    background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
    color: white;
  }
  .slide-type-summary {
    background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
    color: white;
  }
  .slide-type-assessment {
    background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
    color: white;
  }
  .slide-type-conclusion {
    background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
    color: white;
  }

  /* Slide marker on progress bar */
  .slide-marker {
    position: absolute;
    top: 0;
    width: 3px;
    height: 100%;
    background: rgba(255, 255, 255, 0.5);
    transform: translateX(-50%);
  }

  /* Slide list item */
  .slide-list-item {
    display: flex;
    align-items: center;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: background-color 0.2s ease;
    border-left: 3px solid transparent;
  }

  .slide-list-item:hover {
    background-color: rgba(255, 255, 255, 0.05);
  }

  .slide-list-item.active {
    background-color: rgba(59, 130, 246, 0.2);
    border-left-color: #3b82f6;
  }
</style>
